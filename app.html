<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#082A30">
<title>CoverCapy</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter+Tight:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#082A30; --ink2:#0E3A41; --paper:#FDFBF7; --cream:#F6F0E6; --sand:#EFE7D8;
  --mint:#5BE0A0; --mint-soft:#E4F7EE; --mint-deep:#1D7A50;
  --gold:#B8924F; --gold-soft:#F4ECDD; --gold-deep:#8A6A33;
  --plum:#5B3E96; --plum-soft:#EDE7F8;
  --slate:#6B7A7E; --line:#E7E0D2; --line-soft:#F0EADD;
  --shadow:0 1px 2px rgba(8,42,48,.04),0 8px 24px rgba(8,42,48,.06);
  --shadow-lg:0 2px 6px rgba(8,42,48,.06),0 24px 60px rgba(8,42,48,.16);
  --rad:22px; --rad-sm:14px;
  --fd:'Fraunces',Georgia,serif; --fb:'Inter Tight',-apple-system,sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{scroll-behavior:smooth}
body{font-family:var(--fb);color:var(--ink);background:var(--cream);line-height:1.5;-webkit-font-smoothing:antialiased}
button,input,select{font-family:inherit;font-size:inherit;color:inherit;border:none;background:none;cursor:pointer}
input{cursor:text}
h1,h2,h3,h4{font-family:var(--fd);font-weight:600;letter-spacing:-.01em;line-height:1.14}
.serif{font-family:var(--fd)}
.muted{color:var(--slate)}
.eyebrow{font-size:11.5px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--slate)}
.hidden{display:none!important}

.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;border-radius:999px;font-weight:600;font-size:14.5px;padding:13px 21px;transition:transform .12s,opacity .12s;text-decoration:none;white-space:nowrap}
.btn:active{transform:scale(.975)}
.btn-ink{background:var(--ink);color:var(--paper)}
.btn-gold{background:var(--gold);color:#fff}
.btn-mint{background:var(--mint);color:var(--ink)}
.btn-ghost{background:transparent;color:var(--ink);border:1.5px solid var(--line)}
.btn-cream{background:var(--cream);color:var(--ink)}
.btn-full{width:100%}
.btn-sm{padding:9px 15px;font-size:13px}

.card{background:var(--paper);border:1px solid var(--line);border-radius:var(--rad);box-shadow:var(--shadow)}
.pad{padding:22px}

.mini{font-size:11px;font-weight:600;padding:4px 10px;border-radius:999px;background:var(--cream);color:var(--ink);white-space:nowrap}
.mini.tier{background:var(--gold-soft);color:var(--gold-deep)}
.mini.elite{background:var(--plum-soft);color:var(--plum)}
.mini.pend{background:var(--sand);color:var(--slate)}
.mini.lang{background:var(--mint-soft);color:var(--mint-deep)}
.okpill{display:inline-flex;align-items:center;gap:7px;background:var(--mint-soft);color:var(--mint-deep);font-weight:700;font-size:12.5px;padding:7px 13px;border-radius:999px}
.pendpill{display:inline-flex;align-items:center;gap:7px;background:var(--gold-soft);color:var(--gold-deep);font-weight:700;font-size:12.5px;padding:7px 13px;border-radius:999px}

.field{margin-bottom:14px}
.field label{display:block;font-size:12.5px;font-weight:600;color:var(--slate);margin-bottom:6px}
.field input,.field select{width:100%;border:1.5px solid var(--line);border-radius:var(--rad-sm);padding:12px 15px;font-size:15px;background:var(--paper)}
.field input:focus{outline:none;border-color:var(--mint)}

/* ============ GATE ============ */
#gate{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:30px 20px;background:radial-gradient(110% 70% at 50% 0%,var(--cream),var(--paper) 75%)}
.gate-in{width:100%;max-width:980px}
.gate-head{text-align:center;margin-bottom:34px}
.mark{width:62px;height:62px;border-radius:18px;background:var(--ink);display:grid;place-items:center;font-size:31px;margin:0 auto 18px}
.gate-head h1{font-size:clamp(28px,4vw,40px);margin-bottom:8px}
.gate-cols{display:grid;grid-template-columns:1fr 1fr;gap:22px}
@media(max-width:820px){.gate-cols{grid-template-columns:1fr}}
.gate-col{background:var(--paper);border:1px solid var(--line);border-radius:var(--rad);padding:24px;box-shadow:var(--shadow)}
.gate-col .gt{font-family:var(--fd);font-size:19px;margin-bottom:4px}
.gate-col .gs{font-size:13px;color:var(--slate);margin-bottom:18px}
.persona{display:flex;align-items:center;gap:14px;width:100%;text-align:left;padding:15px;border:1.5px solid var(--line);border-radius:var(--rad-sm);background:var(--paper);margin-bottom:11px;transition:border-color .15s,transform .1s}
.persona:hover{border-color:var(--mint)}
.persona:active{transform:scale(.99)}
.persona .pav{width:44px;height:44px;border-radius:50%;display:grid;place-items:center;font-weight:700;font-size:14px;flex-shrink:0}
.persona b{display:block;font-size:14.5px}
.persona span{font-size:12px;color:var(--slate);line-height:1.35;display:block}

/* ============ CHROME: top nav (desktop) + tabbar (mobile) ============ */
#topnav{position:sticky;top:0;z-index:70;background:rgba(253,251,247,.9);backdrop-filter:saturate(180%) blur(14px);border-bottom:1px solid var(--line)}
.tn-in{max-width:1240px;margin:0 auto;display:flex;align-items:center;gap:26px;padding:14px 24px}
.tn-logo{display:flex;align-items:center;gap:10px;font-family:var(--fd);font-size:18px;font-weight:600}
.tn-logo .lm{width:34px;height:34px;border-radius:10px;background:var(--ink);display:grid;place-items:center;font-size:17px}
.tn-links{display:flex;gap:4px;flex:1}
.tn-links a{padding:9px 15px;border-radius:999px;font-size:14px;font-weight:600;color:var(--slate);text-decoration:none;cursor:pointer}
.tn-links a.on{background:var(--cream);color:var(--ink)}
.tn-right{display:flex;align-items:center;gap:10px}
.crown-chip{display:inline-flex;align-items:center;gap:6px;background:var(--gold-soft);color:var(--gold-deep);border-radius:999px;padding:8px 14px;font-size:13px;font-weight:700}
.tabbar{position:fixed;bottom:0;left:0;right:0;background:rgba(253,251,247,.93);backdrop-filter:saturate(180%) blur(16px);border-top:1px solid var(--line);display:none;padding:8px 6px calc(8px + env(safe-area-inset-bottom));z-index:70}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 0;color:var(--slate);font-size:10.5px;font-weight:600}
.tab .ti{font-size:20px;line-height:1}
.tab.on{color:var(--ink)}
@media(max-width:899px){
  .tn-links,.tn-right .btn{display:none}
  .tabbar{display:flex}
  body.inapp{padding-bottom:84px}
}

/* ============ LAYOUT ============ */
.page{max-width:1240px;margin:0 auto;padding:26px 24px 60px}
@media(max-width:899px){.page{padding:18px 16px 40px}}
.phead{margin-bottom:20px}
.phead .eyebrow{margin-bottom:6px}
.phead h1{font-size:clamp(24px,3vw,32px);margin-bottom:4px}
.phead .guide{color:var(--slate);font-size:15px}
.cols2{display:grid;grid-template-columns:1.5fr 1fr;gap:20px;align-items:start}
.cols3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
@media(max-width:899px){.cols2,.cols3{grid-template-columns:1fr}}
.stack>*{margin-bottom:16px}
.slabel{display:flex;align-items:baseline;justify-content:space-between;padding:8px 2px 12px}
.slabel h3{font-size:19px}

/* hero next action */
.hero{position:relative;border-radius:var(--rad);overflow:hidden;background:linear-gradient(150deg,#0C3138,#103E44 55%,#0A2C32);color:var(--paper);padding:26px;box-shadow:var(--shadow-lg)}
.hero .eyebrow{color:var(--mint);margin-bottom:10px}
.hero h2{font-size:clamp(20px,2.4vw,25px);color:var(--paper);margin-bottom:8px}
.hero p{font-size:14px;color:rgba(246,240,230,.78);margin-bottom:18px;max-width:520px}
.hero .gloss{position:absolute;right:-30px;top:-30px;width:180px;height:180px;border-radius:50%;background:radial-gradient(circle,rgba(91,224,160,.2),transparent 70%)}

/* journey spine */
.spine{display:flex;flex-direction:column}
.snode{display:flex;gap:13px;position:relative;padding-bottom:16px}
.snode:last-child{padding-bottom:0}
.snode .rail{position:absolute;left:12px;top:25px;bottom:-3px;width:2px;background:var(--line)}
.snode:last-child .rail{display:none}
.snode.done .rail{background:var(--mint)}
.sdot{width:26px;height:26px;border-radius:50%;flex-shrink:0;display:grid;place-items:center;font-size:12px;font-weight:700;border:2px solid var(--line);background:var(--paper);color:var(--slate);z-index:1}
.snode.done .sdot{background:var(--mint);border-color:var(--mint);color:var(--ink)}
.snode.now .sdot{border-color:var(--ink);color:var(--ink);box-shadow:0 0 0 4px var(--cream)}
.sbody b{font-size:14px;display:block;line-height:1.3}
.snode.done .sbody b{color:var(--slate);font-weight:500}
.sbody span{font-size:12px;color:var(--slate)}

/* pass card */
.passcard{border-radius:var(--rad);padding:22px;color:var(--paper);position:relative;overflow:hidden;box-shadow:var(--shadow-lg)}
.passcard.active{background:linear-gradient(140deg,#0E3A41,#15535C 60%,#0C3138)}
.passcard.pending{background:linear-gradient(140deg,#5A4A2C,#8A6E3C 60%,#6B5530)}
.passcard.empty{background:linear-gradient(140deg,#2C3A3E,#3D5157 60%,#2A3539)}
.passcard .gloss{position:absolute;right:-40px;top:-40px;width:180px;height:180px;border-radius:50%;background:radial-gradient(circle,rgba(255,255,255,.1),transparent 70%)}
.pc-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:18px}
.pc-carrier{font-family:var(--fd);font-size:19px}
.pc-badge{font-size:11px;font-weight:700;padding:5px 11px;border-radius:999px;background:rgba(246,240,230,.18)}
.pc-badge.ok{background:var(--mint);color:var(--ink)}
.pc-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px 12px}
.pc-cell span{font-size:10.5px;color:rgba(246,240,230,.6);display:block;letter-spacing:.05em;text-transform:uppercase;margin-bottom:2px}
.pc-cell b{font-size:15px}
.pc-meter .bar{height:6px;border-radius:99px;background:rgba(246,240,230,.18);overflow:hidden;margin-top:6px}
.pc-meter .bar i{display:block;height:100%;background:var(--mint)}

/* concierge panel */
#ccPanel{position:fixed;top:0;right:0;bottom:0;width:min(420px,100vw);background:var(--paper);z-index:120;box-shadow:-20px 0 60px rgba(8,42,48,.25);transform:translateX(105%);transition:transform .28s cubic-bezier(.2,.8,.2,1);display:flex;flex-direction:column}
#ccPanel.open{transform:none}
.ccp-head{background:var(--ink);color:var(--paper);padding:20px 22px;display:flex;align-items:center;gap:12px}
.ccp-head .av{width:38px;height:38px;border-radius:50%;background:var(--mint);display:grid;place-items:center;font-size:19px;flex-shrink:0}
.ccp-head b{font-family:var(--fd);font-size:16px;display:block}
.ccp-head span{font-size:11.5px;color:rgba(246,240,230,.65)}
.ccp-x{margin-left:auto;color:var(--paper);font-size:22px;padding:4px 8px}
.ccp-chat{flex:1;overflow-y:auto;padding:18px;display:flex;flex-direction:column;gap:11px}
.bubble{max-width:86%;padding:12px 15px;border-radius:16px;font-size:13.5px;line-height:1.45}
.bubble.capy{background:var(--cream);border-bottom-left-radius:5px;align-self:flex-start}
.bubble.me{background:var(--ink);color:var(--paper);border-bottom-right-radius:5px;align-self:flex-end}
.ccp-quick{padding:0 18px 10px;display:flex;flex-wrap:wrap;gap:7px}
.ccp-quick button{font-size:11.5px;font-weight:600;background:var(--cream);border-radius:999px;padding:7px 12px}
.ccp-bar{display:flex;gap:8px;padding:12px 16px calc(14px + env(safe-area-inset-bottom));border-top:1px solid var(--line)}
.ccp-bar input{flex:1;border:1.5px solid var(--line);border-radius:999px;padding:12px 16px;font-size:14px}
.fab{position:fixed;bottom:96px;right:18px;z-index:75;background:var(--ink);color:var(--paper);border-radius:999px;padding:13px 18px;font-size:14px;font-weight:600;display:flex;align-items:center;gap:8px;box-shadow:var(--shadow-lg)}
@media(min-width:900px){.fab{bottom:26px;right:26px}}
.fab .dot{width:7px;height:7px;border-radius:50%;background:var(--mint)}

/* ============ FIND: flagship ============ */
.find-top{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:14px}
.find-search{flex:1;min-width:240px;display:flex;align-items:center;gap:10px;background:var(--paper);border:1.5px solid var(--line);border-radius:999px;padding:12px 18px;box-shadow:var(--shadow)}
.find-search input{flex:1;font-size:15px}
.chips{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px}
.chip{font-size:12.5px;font-weight:600;padding:9px 15px;border-radius:999px;border:1.5px solid var(--line);background:var(--paper);color:var(--ink)}
.chip.on{background:var(--ink);color:var(--paper);border-color:var(--ink)}
.lmarks{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
.fbar{display:grid;grid-template-columns:1.4fr 1fr 1fr 1fr;gap:10px;margin-bottom:12px}
@media(max-width:900px){.fbar{grid-template-columns:1fr 1fr}}
.fcell{background:var(--paper);border:1.5px solid var(--line);border-radius:14px;padding:9px 13px;box-shadow:var(--shadow)}
.fcell label{display:block;font-size:9.5px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:var(--slate);margin-bottom:3px}
.fcell select,.fcell input{width:100%;font-size:14px;font-weight:600;color:var(--ink);background:transparent;border:none;cursor:pointer}
.fcell .within-row{display:flex;align-items:center;gap:8px}
.fcell.omni{position:relative}
.fomni{position:absolute;top:calc(100% + 8px);left:-1.5px;right:-1.5px;background:var(--paper);border:1.5px solid var(--line);border-radius:14px;box-shadow:var(--shadow-lg);z-index:60;max-height:380px;overflow:auto;padding:6px}
.fomni-sec{font-size:9.5px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:var(--slate);padding:9px 11px 4px}
.fomni-row{display:flex;align-items:center;gap:10px;padding:9px 11px;border-radius:10px;cursor:pointer;font-size:13.5px}
.fomni-row:hover,.fomni-row.on{background:var(--cream)}
.fomni-row .fi{flex:none;width:28px;height:28px;border-radius:9px;background:var(--sand);display:grid;place-items:center;font-size:13px}
.fomni-row .ft{flex:1;min-width:0}
.fomni-row .ft b{display:block;font-size:13.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.fomni-row .ft b .hl{color:var(--mint-deep)}
.fomni-row .ft span{display:block;font-size:11.5px;color:var(--slate);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.fomni-row .fx{flex:none;border:none;background:transparent;color:var(--slate);width:24px;height:24px;border-radius:50%;cursor:pointer;display:none;place-items:center}
.fomni-row:hover .fx{display:grid}
.fomni-row .fx:hover{background:var(--sand);color:var(--ink)}
.fomni-empty{padding:14px 12px;font-size:12.5px;color:var(--slate);text-align:center}
.fpager{display:flex;align-items:center;justify-content:center;gap:14px;margin:18px 0 6px}
.fpager .fpg-lbl{font-size:12.5px;font-weight:700;color:var(--slate)}
.fpager button[disabled]{opacity:.4;pointer-events:none}
.fcell input[type=range]{accent-color:var(--mint);height:4px;cursor:pointer;padding:0}
.fhead{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;margin-bottom:10px}
.fhead .sortsel{font-size:12.5px;font-weight:600;border:1.5px solid var(--line);border-radius:999px;padding:7px 13px;background:var(--paper);color:var(--ink)}
.lmark{font-size:12px;font-weight:600;color:var(--gold-deep);background:var(--gold-soft);border-radius:999px;padding:7px 13px}
.find-grid{display:grid;grid-template-columns:minmax(0,1.05fr) minmax(0,.95fr);gap:20px;align-items:start}
@media(max-width:899px){.find-grid{grid-template-columns:1fr}.mapwrap{display:none}.mapwrap.show{display:block}}
.mapwrap{position:sticky;top:86px}
.map{position:relative;border-radius:var(--rad);overflow:hidden;height:min(72vh,640px);border:1px solid var(--line);box-shadow:var(--shadow);background:
  radial-gradient(60% 30% at 85% 90%,#CFE6E0 0%,transparent 60%),
  linear-gradient(160deg,#EDF3E4,#F2EFE2 55%,#E8EFE6)}
.map .road{position:absolute;background:#fff;box-shadow:0 0 0 1px #E3DECF}
.map .road.h{height:7px;left:0;right:0}
.map .road.v{width:7px;top:0;bottom:0}
.map .lbl{position:absolute;font-size:11px;font-weight:600;color:#7B8A86;letter-spacing:.03em}
.pin{position:absolute;transform:translate(-50%,-100%);display:flex;flex-direction:column;align-items:center;cursor:pointer;z-index:2}
.pin .pb{background:var(--ink);color:var(--paper);font-size:11.5px;font-weight:700;border-radius:999px;padding:6px 11px;box-shadow:0 6px 16px rgba(8,42,48,.3);border:2px solid var(--paper);white-space:nowrap}
.pin .pt{width:2px;height:7px;background:var(--ink)}
.pin.tier .pb{background:var(--gold);color:#fff}
.pin.elite .pb{background:var(--plum);color:#fff}
.pin.on .pb{background:var(--mint);color:var(--ink);transform:scale(1.12)}
.map-toggle{display:none;margin-bottom:12px}
@media(max-width:899px){.map-toggle{display:flex;gap:8px}}

/* rich dentist card */
.dcard{border:1px solid var(--line);border-radius:var(--rad);overflow:hidden;background:var(--paper);box-shadow:var(--shadow);margin-bottom:16px;transition:box-shadow .2s,border-color .2s}
.dcard.hl{border-color:var(--mint);box-shadow:0 0 0 3px var(--mint-soft),var(--shadow-lg)}
.dcard .cov{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:10px 18px;background:var(--mint-soft);color:var(--mint-deep);font-size:12.5px;font-weight:600}
.dcard .cov.maybe{background:var(--gold-soft);color:var(--gold-deep)}
.dcard .body{padding:18px;display:flex;gap:15px}
.dcard .av{width:58px;height:58px;border-radius:16px;flex-shrink:0;display:grid;place-items:center;font-size:27px;background:var(--cream)}
.dcard .info{flex:1;min-width:0}
.dcard .nm{font-size:17px;font-weight:600;font-family:var(--fd)}
.dcard .sub{font-size:12.5px;color:var(--slate);margin:2px 0 8px}
.dcard .persona-line{font-size:13px;line-height:1.5;color:var(--ink);margin-bottom:10px}
.dcard .chiprow{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:4px}
.dcard .conf{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:0 18px 4px}
.confbox{background:var(--cream);border-radius:12px;padding:10px 13px}
.confbox span{font-size:10px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--slate);display:block}
.confbox b{font-size:13.5px;font-family:var(--fd)}
.dcard .foot{display:flex;gap:9px;padding:14px 18px 18px;flex-wrap:wrap;align-items:center}
.cmp{margin-left:auto;display:flex;align-items:center;gap:7px;font-size:12px;font-weight:600;color:var(--slate)}
.cmp input{width:17px;height:17px;accent-color:var(--ink);cursor:pointer}
.cmpbar{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);z-index:74;background:var(--ink);color:var(--paper);border-radius:999px;padding:12px 20px;display:none;align-items:center;gap:14px;box-shadow:var(--shadow-lg);font-size:13.5px;font-weight:600}
@media(min-width:900px){.cmpbar{bottom:24px}}
.cmpbar.show{display:flex}

/* stats / demand */
.stat{background:var(--paper);border:1px solid var(--line);border-radius:var(--rad-sm);padding:16px;text-align:center}
.stat b{font-family:var(--fd);font-size:26px;display:block}
.stat span{font-size:11.5px;color:var(--slate)}
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
@media(max-width:899px){.stat-grid{grid-template-columns:repeat(2,1fr)}}
.bar-row{display:flex;align-items:center;gap:10px;font-size:13px;margin-bottom:9px}
.bar-row span:first-child{width:130px;flex-shrink:0;color:var(--ink)}
.bar-row .bar{flex:1;height:8px;border-radius:99px;background:var(--cream);overflow:hidden}
.bar-row .bar i{display:block;height:100%;background:var(--gold);border-radius:99px}
.bar-row.mint .bar i{background:var(--mint)}
.bar-row b{width:46px;text-align:right;font-size:12.5px}

/* dentist nav tier pill, lock */
.lockwrap{position:relative}
.lockover{position:absolute;inset:0;background:rgba(253,251,247,.85);backdrop-filter:blur(2px);border-radius:var(--rad);z-index:5;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:10px;text-align:center;padding:24px}
.tierpill{display:inline-flex;align-items:center;gap:6px;border-radius:999px;padding:6px 13px;font-size:11.5px;font-weight:800}

/* ladder, contribution */
.contrib{border-radius:var(--rad);padding:24px;background:linear-gradient(140deg,#15535C,#0E3A41);color:var(--paper);box-shadow:var(--shadow-lg)}
.contrib .eyebrow{color:var(--mint);margin-bottom:10px}
.contrib .big{font-family:var(--fd);font-size:38px;line-height:1}
.contrib .big small{font-size:17px;color:rgba(246,240,230,.6);font-weight:400}
.contrib .bar{height:8px;border-radius:99px;background:rgba(246,240,230,.16);overflow:hidden;margin:14px 0 6px}
.contrib .bar i{display:block;height:100%;background:linear-gradient(90deg,var(--mint),#8FF0C2)}
/* ===== Diamond Crowns flair ===== */
.dchip{background:linear-gradient(120deg,var(--mint-soft),#E2F8EF 45%,var(--mint-soft) 65%)!important;position:relative;overflow:hidden}
.dchip::after{content:"";position:absolute;top:0;left:-70%;width:45%;height:100%;background:linear-gradient(100deg,transparent,rgba(255,255,255,.9),transparent);transform:skewX(-18deg);animation:dshine 3.4s ease-in-out infinite;pointer-events:none}
@keyframes dshine{0%,55%{left:-70%}85%,100%{left:140%}}
.contrib.vault{position:relative;overflow:hidden;border:1px solid rgba(143,240,194,.25)}
.contrib.vault::before{content:"";position:absolute;inset:0;background:radial-gradient(circle at 86% 10%,rgba(143,240,194,.22),transparent 42%),radial-gradient(circle at 6% 96%,rgba(143,240,194,.12),transparent 38%);pointer-events:none}
.contrib.vault .bar{box-shadow:inset 0 0 0 1px rgba(143,240,194,.18)}
.contrib.vault .bar i{background:linear-gradient(90deg,#5ED0B5,#8FF0C2,#D8FCEC,#8FF0C2);background-size:220% 100%;animation:dflow 2.8s linear infinite;box-shadow:0 0 12px rgba(143,240,194,.55)}
@keyframes dflow{to{background-position:-220% 0}}
.dgem{display:inline-block;animation:dtwirl 4.5s ease-in-out infinite}
@keyframes dtwirl{0%,72%,100%{transform:none;filter:none}80%{transform:scale(1.22) rotate(-9deg);filter:drop-shadow(0 0 7px rgba(143,240,194,.85))}88%{transform:scale(1.06) rotate(5deg)}}
@media (prefers-reduced-motion:reduce){.dchip::after,.contrib.vault .bar i,.dgem{animation:none}}
/* ===== Office journey pipeline ===== */
.pipe{position:relative;margin:2px 0 0}
.pipe::before{content:"";position:absolute;left:16px;top:16px;bottom:16px;width:2px;background:linear-gradient(180deg,var(--line) 0%,var(--mint) 100%);border-radius:2px}
.pipe-step{display:flex;gap:12px;align-items:center;padding:8px 0;position:relative}
.pipe-step .pk{width:34px;height:34px;border-radius:12px;background:var(--cream);display:grid;place-items:center;font-size:15px;flex:0 0 auto;position:relative;z-index:1;box-shadow:0 0 0 3px var(--paper)}
.pipe-step .pt{flex:1;min-width:0}
.pipe-step .pt b{font-size:13.5px;display:block;line-height:1.3}
.pipe-step .pt span{font-size:11.5px;color:var(--slate);line-height:1.4}
.pipe-amt{font-weight:800;font-size:12px;color:var(--mint-deep);background:var(--mint-soft);border-radius:999px;padding:5px 11px;white-space:nowrap;flex:0 0 auto}
.pipe-step.jack{margin-top:8px;border-radius:16px;background:linear-gradient(135deg,#15535C,#0E3A41);padding:13px 14px;color:var(--paper);box-shadow:var(--shadow);position:relative;overflow:hidden}
.pipe-step.jack::after{content:"";position:absolute;top:0;left:-70%;width:45%;height:100%;background:linear-gradient(100deg,transparent,rgba(255,255,255,.14),transparent);transform:skewX(-18deg);animation:dshine 3.4s ease-in-out infinite;pointer-events:none}
.pipe-step.jack .pk{background:rgba(143,240,194,.16);box-shadow:none}
.pipe-step.jack .pt b{color:var(--paper)}
.pipe-step.jack .pt span{color:rgba(246,240,230,.7)}
.pipe-step.jack .pipe-amt{background:rgba(143,240,194,.18);color:#8FF0C2;box-shadow:0 0 12px rgba(143,240,194,.35);font-size:13px}
.boost-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
.boost{display:flex;align-items:center;gap:7px;border:1px solid var(--line);border-radius:12px;padding:9px 11px;font-size:12px;font-weight:650;background:var(--paper)}
.boost span{margin-left:auto;color:var(--mint-deep);font-weight:800;font-size:11.5px}
@media (max-width:560px){.boost{font-size:11px;padding:8px 9px}}
.lrow{display:flex;align-items:center;gap:13px;padding:12px 2px;border-bottom:1px solid var(--line-soft)}
.lrow:last-child{border:none}
.lrow .lk{width:32px;height:32px;border-radius:50%;display:grid;place-items:center;font-size:13px;background:var(--cream);flex-shrink:0;font-weight:700}
.lrow.hit .lk{background:var(--mint);color:var(--ink)}
.lrow .lt{flex:1}
.lrow .lt b{font-size:13.5px;display:block}
.lrow .lt span{font-size:11.5px;color:var(--slate)}
.lrow .amt{font-size:12.5px;font-weight:700;color:var(--gold-deep)}

/* tables */
.tbl{width:100%;border-collapse:collapse;font-size:13.5px}
.tbl th{text-align:left;font-size:10.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--slate);padding:10px;border-bottom:1px solid var(--line)}
.tbl td{padding:13px 10px;border-bottom:1px solid var(--line-soft);vertical-align:top}
.tbl tr:last-child td{border:none}

/* rewards portal */
.rw-commit{background:linear-gradient(140deg,#0E3A41,#15535C);color:var(--paper);border-radius:var(--rad);padding:24px;box-shadow:var(--shadow-lg);margin-bottom:22px}
.rw-commit input[type=range]{width:100%;margin:16px 0 8px;accent-color:var(--mint);height:6px;cursor:pointer}
.rw-commit .rw-big{font-family:var(--fd);font-size:34px;line-height:1}
.rw-commit .rw-big small{font-size:15px;color:rgba(246,240,230,.6);font-weight:400}
.gift-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:15px;margin-bottom:26px;transition:opacity .2s}
.gift-grid.locked .gcard{opacity:.4;pointer-events:none;filter:saturate(.6)}
.gcard{aspect-ratio:1.586;border-radius:16px;border:none;color:#fff;display:flex;flex-direction:column;justify-content:space-between;align-items:flex-start;padding:15px;cursor:pointer;box-shadow:var(--shadow);transition:transform .16s,box-shadow .16s;text-align:left;position:relative;overflow:hidden}
.gcard:hover{transform:translateY(-4px) scale(1.015);box-shadow:var(--shadow-lg)}
.gcard:after{content:'';position:absolute;top:-30%;right:-15%;width:60%;height:90%;background:radial-gradient(circle,rgba(255,255,255,.16),transparent 70%)}
.gcard .gb{font-weight:800;font-size:15.5px;letter-spacing:.01em;text-shadow:0 1px 5px rgba(0,0,0,.3);z-index:1}
.gcard .gfoot{display:flex;justify-content:space-between;align-items:flex-end;width:100%;z-index:1}
.gcard .gv{font-family:var(--fd);font-size:23px}
.gcard .gd{font-size:10.5px;font-weight:700;background:rgba(255,255,255,.22);border-radius:999px;padding:4px 9px;backdrop-filter:blur(2px)}
/* sheets */
.sheet-back{position:fixed;inset:0;background:rgba(8,42,48,.42);z-index:130;display:none;align-items:flex-end;justify-content:center}
@media(min-width:900px){.sheet-back{align-items:center}}

@keyframes rise{from{transform:translateY(60px);opacity:.4}to{transform:none;opacity:1}}

.elig-line{display:flex;justify-content:space-between;gap:10px;padding:9px 0;border-bottom:1px solid var(--line-soft);font-size:13.5px}
.elig-line:last-child{border:none}

.rowcard{display:flex;align-items:center;gap:13px;padding:15px;background:var(--paper);border:1px solid var(--line);border-radius:var(--rad-sm);box-shadow:var(--shadow);width:100%;text-align:left;margin-bottom:11px}
.rowcard .ic{width:38px;height:38px;border-radius:11px;display:grid;place-items:center;font-size:18px;flex-shrink:0;background:var(--cream)}

/* =====================================================================
   INS: centralized insurance logic. Pure functions over a patient's
   plans[] array. In production these map to patient_insurance_plans,
   insurance_plan_roles, benefit_snapshots, and coverage_coordination_estimates.
   Every coverage surface reads from here so logic is never scattered.
   ===================================================================== */
function fmtToday(){var d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
var INS={
  plans:function(p){return (p&&p.plans)||[];},
  active:function(p){return INS.plans(p).filter(function(x){return x.status==='active';});},
  primary:function(p){return INS.active(p).filter(function(x){return x.role==='primary';})[0]||null;},
  secondaries:function(p){return INS.active(p).filter(function(x){return x.role==='secondary'||x.role==='supplemental';});},
  pending:function(p){return INS.plans(p).filter(function(x){return x.status==='pending';});},
  expired:function(p){return INS.plans(p).filter(function(x){return x.status==='expired';});},
  considering:function(p){return INS.plans(p).filter(function(x){return x.status==='considering';});},
  status:function(p){
    if(INS.primary(p))return 'active';
    if(INS.pending(p).length)return 'pending';
    if(INS.expired(p).length)return 'expired';
    if(INS.plans(p).length)return 'inactive';
    return 'none';
  },
  // Dashboard headline + plain-language meaning, per coverage state
  summary:function(p){
    var st=INS.status(p),pr=INS.primary(p),sec=INS.secondaries(p);
    if(st==='none') return {head:'Get PPO coverage first',sub:'You have no active dental plan yet. Activating one is the first step to being seen and to earning your first crowns.',tone:'start'};
    if(st==='pending'){var pe=INS.pending(p)[0];return {head:'Your plan is being verified',sub:'We are checking '+pe.name+' with the carrier, usually the same day. It shows as verified here the moment it clears.',tone:'pending'};}
    if(st==='expired'){var ex=INS.expired(p)[0];return {head:'Your '+ex.carrier+' plan is no longer active',sub:'Add a current plan before booking treatment. You can remove the old one from your wallet.',tone:'expired'};}
    if(sec.length) return {head:'You have '+(1+sec.length)+' verified plans',sub:'Your main plan is '+pr.name+', and '+sec[0].name+' helps alongside it. Your dentist applies them together when you book, so there is nothing for you to calculate.',tone:'dual'};
    return {head:'Your '+pr.name+' is verified and active',sub:'Cleanings and exams are covered in full. When you book, your benefit details are shared with the office so they can check your coverage.',tone:'single'};
  },
  nextAction:function(p){
    var st=INS.status(p);
    if(st==='none') return {label:'Get covered',act:'shop'};
    if(st==='pending') return {label:'View status',act:'go:coverage'};
    if(st==='expired') return {label:'Go to coverage',act:'go:coverage'};
    return {label:'View your coverage',act:'go:coverage'};
  },
  // Per-dentist plan fit using the office's accepted carriers
  fitFor:function(p,d){
    function carrierFit(plan){
      if(!plan) return null;
      if(d.accepts&&d.accepts.indexOf(plan.carrier)>-1) return 'works';
      if(d.accepts) return 'no';
      return d.fit==='strong'?'works':'unknown';
    }
    return {primary:carrierFit(INS.primary(p)), secondary:INS.secondaries(p).length?carrierFit(INS.secondaries(p)[0]):null};
  },
  // Coordination of benefits estimate. Deliberately conservative.
  coordination:function(p,fee){
    var pr=INS.primary(p),sec=INS.secondaries(p)[0]||null;
    if(!pr) return null;
    var primaryPays=Math.round(fee*(pr.major/100));
    var afterPrimary=fee-primaryPays;
    return {fee:fee,primaryName:pr.name,primaryPays:primaryPays,afterPrimary:afterPrimary,
            secondaryName:sec?sec.name:null,
            secondaryPPO:sec&&sec.type==='PPO'};
  },
  mask:function(id){if(!id)return '';return id.length<=4?id:id.slice(0,2)+'\u2022\u2022\u2022\u2022'+id.slice(-3);}
};

function filteredDentists(){
  var f=S.find.filters,lm=S.find.landmark,F=S.find;
  return DEMO_DATA.dentists.filter(function(d){
    if(lm!=='all'&&d.landmark!==lm) return false;
    if(F.treatment&&d.treatments.indexOf(F.treatment)<0) return false;
    if(F.ppo&&(!d.accepts||d.accepts.indexOf(F.ppo)<0)) return false;
    if(F.within&&d.mi>F.within) return false;
    if(F.minRating&&d.rating<F.minRating) return false;
    if(f.weekends&&!d.weekends) return false;
    if(f.offer&&!d.offer) return false;
    if(f.acceptingNew&&!d.acceptingNew) return false;
    if(f.onlineBooking&&!d.onlineBooking) return false;
    if(f.english&&d.langs.indexOf('English')<0) return false;
    if(f.spanish&&d.langs.indexOf('Spanish')<0) return false;
    return true;
  }).sort(function(a,b){return ((b.tier==='elite')?1:0)-((a.tier==='elite')?1:0)||a.mi-b.mi;});
}

    for(j=1;j<=lb;j++){ var c=a.charAt(i-1)===b.charAt(j-1)?0:1; cur[j]=Math.min(prev[j]+1,cur[j-1]+1,prev[j-1]+c); if(cur[j]<mn)mn=cur[j]; }
    if(mn>max) return max+1; var t=prev;prev=cur;cur=t; }
  return prev[lb]; }
function tokHit(qt,ft){ if(!qt||!ft) return false;
  if(ft.indexOf(qt)===0||(qt.length>=3&&ft.indexOf(qt)>=0)) return true;
  if(qt.length<4) return false; var m=qt.length>=6?2:1; return fz(qt,ft,m)<=m; }
function fzMatch(q,hay){ var qs=norm(q).split(' ').filter(Boolean), fs=norm(hay).split(' ').filter(Boolean);
  if(!qs.length||!fs.length) return false;
  return qs.every(function(qt){ return fs.some(function(ft){ return tokHit(qt,ft); }); }); }
function norm(x){ return String(x==null?'':x).toLowerCase().replace(/[.,]/g,' ').replace(/\s+/g,' ').trim(); }
function hl(t,q){ var T=esc(t), qn=norm(q); if(!qn) return T;
  var i=norm(t).indexOf(qn); if(i<0) return T;
  return esc(t.slice(0,i))+'<span class="hl">'+esc(t.slice(i,i+qn.length))+'</span>'+esc(t.slice(i+qn.length)); }
function box(){ return document.getElementById('findOmni'); }
function close(){ var b=box(); if(b){ b.remove(); } items=[]; idx=-1; }
function paint(){ var rows=document.querySelectorAll('#findOmni .fomni-row'); rows.forEach(function(r,i){ r.classList.toggle('on', i===idx); }); var el=document.querySelector('#findOmni .fomni-row.on'); if(el) el.scrollIntoView({block:'nearest'}); }
function open(html){
  var cell=document.getElementById('findQ'); if(!cell) return;
  var fc=cell.closest('.fcell'); if(!fc) return; fc.classList.add('omni');
  var b=box(); if(!b){ b=document.createElement('div'); b.id='findOmni'; b.className='fomni'; fc.appendChild(b); }
  b.innerHTML=html;
}
function row(it,q){
  var i=items.length; items.push(it);
  var del=(it._rec!=null)?'<button class="fx" type="button" aria-label="Remove recent search" onmousedown="ccFindRecDel('+it._rec+',event)">&#10005;</button>':'';
  return '<div class="fomni-row'+(i===idx?' on':'')+'" data-i="'+i+'" onmousedown="event.preventDefault();ccFindPick('+i+')"><span class="fi">'+(it.ic||'&#128205;')+'</span><span class="ft"><b>'+hl(it.label,q||'')+'</b><span>'+esc(it.sub||'')+'</span></span>'+del+'</div>';
}
window.ccFindPick=function(i){ var it=items[i]; if(!it) return; close(); try{ it.run(); }catch(e){ console.warn('find pick failed',e); } };

function home(){
  items=[]; idx=-1; var html='';
  var rec=recGet();
  if(rec.length){ html+='<div class="fomni-sec">Recent searches</div>';
    rec.forEach(function(e,i){ html+=row({label:e.label,sub:'Recent',ic:'&#128337;',_rec:i,run:function(){ go(e.lat,e.lng,e.label); }}); }); }
  var seen={}, cs=[];
  (DEMO_DATA.dentists||[]).forEach(function(d){ var c=(d.city||'').trim(); if(c&&!seen[norm(c)]&&d.lat&&d.lng){ seen[norm(c)]=1; cs.push({c:c,lat:d.lat,lng:d.lng}); } });
  if(cs.length){ html+='<div class="fomni-sec">Areas with offices</div>';
    cs.slice(0,5).forEach(function(x){ html+=row({label:x.c,sub:'Browse this area',ic:'&#128205;',run:function(){ go(x.lat,x.lng,x.c); }}); }); }
  if(!items.length){ html='<div class="fomni-empty">Type a city, ZIP, or office name.</div>'; }
  open(html);
}

function suggest(q){
  lastQ=q;
  var html='', lq=norm(q);
  items=[]; idx=-1;
  /* offices already loaded (token + typo tolerant) */
  var ds=(DEMO_DATA.dentists||[]).filter(function(d){ return fzMatch(lq,[d.name,d.doc,d.city].filter(Boolean).join(' ')); }).slice(0,3);
  if(ds.length){ html+='<div class="fomni-sec">Offices</div>';
    ds.forEach(function(d){ html+=row({label:d.name,sub:(d.doc||'')+' · '+(d.city||''),ic:'&#129463;',run:function(){ try{ profileSheet(d.id); }catch(e){} }},q); }); }
  var fill=function(locs){
    var h2=html;
    if(locs.length){ h2+='<div class="fomni-sec">Locations</div>';
      locs.forEach(function(L){ h2+=row(L,q); }); }
    if(!items.length && !locs.length && !ds.length){ h2='<div class="fomni-empty">No matches for &quot;'+esc(q)+'&quot;. Try a city, ZIP, or office name.</div>'; }
    open(h2);
  };
  if(window.__supa){
    window.__supa.rpc('nav_search_suggest',{q:q,max_n:6}).then(function(r){
      if(lastQ!==q) return; /* stale */
      var locs=[];
      ((r&&r.data)||[]).forEach(function(x){
        var ic=x.kind==='zip'?'&#128230;':x.kind==='state'?'&#127463;':'&#128205;';
        if(x.kind==='state') ic='&#128506;';
        locs.push({label:x.label,sub:(x.sublabel||'')+(x.kind==='zip'?' · ZIP':''),ic:ic,
          run:(function(xx){ return function(){
            if(xx.lat!=null&&xx.lng!=null){ go(+xx.lat,+xx.lng,xx.label+(xx.kind==='zip'?'':'')); }
            else { byName(xx.value||xx.label); }
          }; })(x)});
      });
      fill(locs);
    }).catch(function(){ fill([]); });
  } else { fill([]); }
}

/* run a geo search and reload the list with true distances */
function go(lat,lng,label){
  var inp=document.getElementById('findQ'); if(inp) inp.value=label;
  S.find.q=label; S.find.center={lat:lat,lng:lng,label:label};
  recAdd(label,lat,lng);
  refresh();
}
function byName(name){
  if(!window.__supa){ return; }
  window.__supa.rpc('search_dentists_near_location',{location_name:name,radius_miles:S.find.within||25}).then(function(r){
    var data=(r&&r.data)||[];
    if(r&&r.error||!data.length){ return; }
    S.find.q=name; S.find.center={label:name,ids:true};
    recAdd(name,null,null);
    loadByIds(data);
  });
}
window.ccFindRefresh=refresh;
function refresh(){
  var c=S.find.center; if(!c||c.lat==null){ try{ route(); }catch(e){} return; }
  if(!window.__supa){ try{ route(); }catch(e){} return; }
  window.__supa.rpc('search_dentists_near_coordinates',{in_lat:c.lat,in_lng:c.lng,radius_miles:Math.max(S.find.within||25, PLAT_REACH)}).then(function(r){
    var data=(r&&r.data)||[];
    if(r&&r.error){ console.warn('geo search failed', r.error); return; }
    loadByIds(data);
  });
}
function loadByIds(data){
  var ids=data.map(function(x){ return x.id; }).slice(0,60);
  var dist={}; data.forEach(function(x){ dist[x.id]=+x.distance_miles; });
  if(!ids.length){ DEMO_DATA.dentists=[]; try{ route(); }catch(e){} return; }
  window.__supa.from('dentists')
    .select('id,name,practice_name,doctor_name,city,state,zip,website,booking_url,phone,short_description,insurance_networks,procedures,specialties,languages,review_themes,open_weekends,accreditation_status,membership_tier,featured_tier,pending_display_label,weighted_rating,weighted_review_count,aggregate_rating,aggregate_review_count,google_rating,google_review_count,latitude,longitude,distance_miles,email')
    .in('id',ids).then(function(res){
      if(res.error||!res.data){ return; }
      var rows=res.data.map(ccMapDentist);
      rows.forEach(function(d){ if(dist[d.id]!=null&&isFinite(dist[d.id])){ d.mi=Math.round(dist[d.id]*10)/10; } });
      /* ppodentists visibility rule: hide offices past the radius, EXCEPT Platinum Elite which stays visible to 18 mi */
      var within=S.find.within||25;
      rows=rows.filter(function(d){
        var dm=(typeof d.mi==='number')?d.mi:null; if(dm==null) return true;
        var reach=(d.tier==='elite')?Math.max(within,PLAT_REACH):within;
        return dm<=reach+0.5;
      });
      /* one card per Platinum practice: keep the nearest location */
      rows.sort(function(a,b){ return ((+a.mi||999)-(+b.mi||999)); });
      var seenP={};
      rows=rows.filter(function(d){ if(d.tier!=='elite') return true; var k=(d.name||'').toLowerCase(); if(seenP[k]) return false; seenP[k]=1; return true; });
      rows.sort(function(a,b){ return scoreOf(b)-scoreOf(a); });
      ccLayoutPins(rows); DEMO_DATA.dentists=rows;
      S.find.page=1;
      try{ route(); }catch(e){}
    });
}

/* ppodentists ranking, ported: distance 40%, tier 30%, profile quality 10%,
   rewards 10% (no signal yet -> 0), engagement 10%. A close Capy Accredited
   office can outrank a far Platinum one; never pay-to-win. */
var PLAT_REACH=18, TIER_MULT={elite:1.8,tier:1.35,verified:1.0,pend:0.75};
function scoreOf(d){
  var dist=(typeof d.mi==='number')?d.mi:PLAT_REACH;
  var distScore=1-Math.min(dist/PLAT_REACH,1);
  var mult=(d.tier==='pend'&&/verified/i.test(d.tag||''))?TIER_MULT.verified:(TIER_MULT[d.tier]||0.75);
  var tierScore=(mult-0.75)/(1.8-0.75);
  var q=0; if(d.website)q++; if(d.booking_url)q++; if(d.themes&&d.themes.length)q++; if(d.accepts&&d.accepts.length)q++; if(d.line)q++;
  var eng=Math.min(Math.log10((d.reviews||0)+1)/Math.log10(500),1);
  return 0.40*distScore+0.30*tierScore+0.10*(q/5)+0.10*0+0.10*eng;
}
/* typed-but-unselected text still filters the loaded list */
var _filtered=filteredDentists;
window.filteredDentists=function(){
  var list=_filtered();
  var q=(S.find.q||'').trim();
  var c=S.find.center;
  if(q && !c){
    var f=list.filter(function(d){ return fzMatch(q,[d.name,d.doc,d.city,String(d.zip||'')].filter(Boolean).join(' ')); });
    if(f.length) list=f;
  }
  if(c && c.lat!=null){ list=list.slice().sort(function(a,b){ return scoreOf(b)-scoreOf(a); }); }
  return list;
};

/* ---- 12 results per page ---- */
var PAGE_SIZE=12;
window.ccFindPage=function(d){ S.find.page=(S.find.page||1)+d; ccFindPaginate(); try{ document.getElementById('findList').scrollIntoView({behavior:'smooth',block:'start'}); }catch(e){} };
window.ccFindPaginate=function(){
  var listEl=document.getElementById('findList'); if(!listEl) return;
  var cards=[].slice.call(listEl.querySelectorAll('.dcard'));
  var old=document.getElementById('fpager'); if(old) old.remove();
  var n=cards.length, pages=Math.max(1,Math.ceil(n/PAGE_SIZE));
  if(!S.find.page||S.find.page<1||S.find.page>pages) S.find.page=1;
  var p=S.find.page;
  cards.forEach(function(cd,i){ cd.style.display=(i>=(p-1)*PAGE_SIZE && i<p*PAGE_SIZE)?'':'none'; });
  var cnt=listEl.querySelector('.muted');
  if(cnt) cnt.innerHTML=n+' office'+(n===1?'':'s')+' &#183; sorted by recommended'+(pages>1?' &#183; page '+p+' of '+pages:'');
  if(pages>1){
    var pg=document.createElement('div'); pg.id='fpager'; pg.className='fpager';
    pg.innerHTML='<button class="btn btn-ghost btn-sm" '+(p<=1?'disabled':'')+' onclick="ccFindPage(-1)">&#8592; Previous</button>'
      +'<span class="fpg-lbl">Page '+p+' of '+pages+'</span>'
      +'<button class="btn btn-ink btn-sm" '+(p>=pages?'disabled':'')+' onclick="ccFindPage(1)">Next &#8594;</button>';
    listEl.appendChild(pg);
  }
};

function key(e){
  var b=box();
  if(e.key==='ArrowDown'){ e.preventDefault(); if(!b){ suggest(e.target.value||''); return; } idx=(idx+1)%Math.max(items.length,1); paint(); }
  else if(e.key==='ArrowUp'){ e.preventDefault(); if(items.length){ idx=(idx-1+items.length)%items.length; paint(); } }
  else if(e.key==='Tab' && b && items.length){ e.preventDefault(); var it=items[idx>=0?idx:0]; if(it){ e.target.value=it.label; suggest(it.label); } }
  else if(e.key==='Enter'){ e.preventDefault();
    if(idx>=0 && items[idx]){ ccFindPick(idx); return; }
    if(items.length){ ccFindPick(0); return; }
    var v=(e.target.value||'').trim();
    if(v){ S.find.q=v; S.find.center=null; close(); try{ route(); }catch(_){} }
  }
  else if(e.key==='Escape'){ close(); e.target.blur(); }
}

function wire(){
  var inp=document.getElementById('findQ'); if(!inp||inp._omni) return; inp._omni=1;
  inp.setAttribute('autocomplete','off');
  inp.setAttribute('placeholder','City, ZIP, office, or dentist');
  inp.addEventListener('input', function(){ var v=this.value; clearTimeout(deb);
    if(!v.trim()){ S.find.q=''; S.find.center=null; deb=setTimeout(home,120); return; }
    deb=setTimeout(function(){ suggest(v.trim()); },160); });
  inp.addEventListener('keydown', key);
  inp.addEventListener('focus', function(){ if(this.value.trim()) suggest(this.value.trim()); else home(); });
  var fw=document.getElementById('findWithin');
  if(fw && !fw._omni){ fw._omni=1; fw.addEventListener('change', function(){ if(S.find.center&&S.find.center.lat!=null){ refresh(); } }); }
}
document.addEventListener('mousedown', function(e){
  var b=box(); if(!b) return;
  var cell=b.closest('.fcell');
  if(cell && !cell.contains(e.target)) close();
});
var _after=afterRender;
window.afterRender=function(id){ _after(id); if(id==='find'){ try{ wire(); }catch(e){} try{ ccFindPaginate(); }catch(e){} } };
if(S && S.find && !('center' in S.find)) S.find.center=null;
})();
</script>

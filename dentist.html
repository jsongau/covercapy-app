<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#082A30">
<title>CoverCapy · Practice Portal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,500&family=Inter+Tight:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#082A30; --ink2:#0E3A41; --paper:#FDFBF7; --cream:#F6F0E6; --sand:#EFE7D8;
  --mint:#5BE0A0; --mint-soft:#E4F7EE; --mint-deep:#1D7A50;
  --gold:#B8924F; --gold-soft:#F4ECDD; --gold-deep:#8A6A33;
  --plum:#5B3E96; --plum-soft:#EDE7F8;
  --slate:#6B7A7E; --line:#E7E0D2; --line-soft:#F0EADD;
  --warn:#A8552E; --warn-soft:#F6E4D8;
  --shadow:0 1px 2px rgba(8,42,48,.04),0 8px 24px rgba(8,42,48,.06);
  --shadow-lg:0 2px 6px rgba(8,42,48,.06),0 24px 60px rgba(8,42,48,.16);
  --rad:22px; --rad-sm:14px;
  --fd:'Fraunces',Georgia,serif; --fb:'Inter Tight',-apple-system,sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{scroll-behavior:smooth}
body{font-family:var(--fb);color:var(--ink);background:var(--cream);line-height:1.5;-webkit-font-smoothing:antialiased}
button,input,select,textarea{font-family:inherit;font-size:inherit;color:inherit;border:none;background:none;cursor:pointer}
input,textarea{cursor:text}
h1,h2,h3,h4{font-family:var(--fd);font-weight:600;letter-spacing:-.01em;line-height:1.14}
.serif{font-family:var(--fd)}
.muted{color:var(--slate)}
.eyebrow{font-size:11.5px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--slate)}
.hidden{display:none!important}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;border-radius:999px;font-weight:600;font-size:14.5px;padding:13px 21px;transition:transform .12s,opacity .12s;text-decoration:none;white-space:nowrap}
.btn:active{transform:scale(.975)}
.btn-ink{background:var(--ink);color:var(--paper)}
.btn-gold{background:var(--gold);color:#fff}
.btn-mint{background:var(--mint);color:var(--ink)}
.btn-plum{background:var(--plum);color:#fff}
.btn-ghost{background:transparent;color:var(--ink);border:1.5px solid var(--line)}
.btn-full{width:100%}
.btn-sm{padding:9px 15px;font-size:13px}
.card{background:var(--paper);border:1px solid var(--line);border-radius:var(--rad);box-shadow:var(--shadow)}
.pad{padding:22px}
.mini{font-size:11px;font-weight:600;padding:4px 10px;border-radius:999px;background:var(--cream);color:var(--ink);white-space:nowrap}
.mini.tier{background:var(--gold-soft);color:var(--gold-deep)}
.mini.elite{background:var(--plum-soft);color:var(--plum)}
.mini.pend{background:var(--sand);color:var(--slate)}
.mini.lang{background:var(--mint-soft);color:var(--mint-deep)}
.okpill{display:inline-flex;align-items:center;gap:7px;background:var(--mint-soft);color:var(--mint-deep);font-weight:700;font-size:12.5px;padding:7px 13px;border-radius:999px}
.pendpill{display:inline-flex;align-items:center;gap:7px;background:var(--gold-soft);color:var(--gold-deep);font-weight:700;font-size:12.5px;padding:7px 13px;border-radius:999px}
.field{margin-bottom:14px}
.field label{display:block;font-size:12.5px;font-weight:600;color:var(--slate);margin-bottom:6px}
.field input,.field select,.field textarea{width:100%;border:1.5px solid var(--line);border-radius:var(--rad-sm);padding:12px 15px;font-size:15px;background:var(--paper)}
.field input:focus,.field textarea:focus{outline:none;border-color:var(--mint)}
.up{color:var(--mint-deep);font-weight:700}
.dn{color:var(--warn);font-weight:700}

/* ============ GATE ============ */
#gate{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:30px 20px;background:radial-gradient(110% 70% at 50% 0%,var(--cream),var(--paper) 75%)}
.gate-in{width:100%;max-width:760px}
.gate-head{text-align:center;margin-bottom:30px}
.mark{width:62px;height:62px;border-radius:18px;background:var(--ink);display:grid;place-items:center;font-size:31px;margin:0 auto 18px}
.gate-head h1{font-size:clamp(28px,4vw,40px);margin-bottom:8px}
.persona{display:flex;align-items:center;gap:14px;width:100%;text-align:left;padding:17px;border:1.5px solid var(--line);border-radius:var(--rad-sm);background:var(--paper);margin-bottom:11px;transition:border-color .15s,transform .1s;box-shadow:var(--shadow)}
.persona:hover{border-color:var(--mint)}
.persona:active{transform:scale(.99)}
.persona .pav{width:46px;height:46px;border-radius:14px;display:grid;place-items:center;font-weight:700;font-size:19px;flex-shrink:0}
.persona b{display:block;font-size:15px}
.persona span{font-size:12.5px;color:var(--slate);line-height:1.4;display:block}

/* ============ WELCOME EXPERIENCE ============ */
#wx{position:fixed;inset:0;z-index:200;background:linear-gradient(155deg,#082A30,#0E3A41 55%,#0A2C32);color:var(--paper);display:none;overflow-y:auto}
#wx.open{display:block;animation:wxin .4s ease}
@keyframes wxin{from{opacity:0}to{opacity:1}}
.wx-in{max-width:680px;margin:0 auto;padding:54px 24px 60px;position:relative;z-index:1}
.wx-orb{position:fixed;border-radius:50%;pointer-events:none;z-index:0}
.wx-eyebrow{font-size:11px;font-weight:800;letter-spacing:.16em;text-transform:uppercase;color:var(--mint);margin-bottom:14px}
.wx-in h1{font-size:clamp(30px,5vw,44px);color:var(--paper);line-height:1.12}
.wx-in h1 em{font-style:italic;color:var(--mint)}
.wx-sub{margin-top:12px;font-size:15.5px;color:rgba(246,240,230,.75);line-height:1.6;max-width:50ch}
.wx-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-top:30px}
@media(min-width:640px){.wx-grid{grid-template-columns:repeat(3,1fr)}}
.wx-stat{background:rgba(246,240,230,.06);border:1px solid rgba(246,240,230,.13);border-radius:18px;padding:18px 16px;opacity:0;transform:translateY(10px);transition:opacity .5s,transform .5s}
.wx-stat.in{opacity:1;transform:none}
.wx-stat .n{font-family:var(--fd);font-size:30px;font-weight:600;color:var(--paper);line-height:1}
.wx-stat .n em{font-style:normal;color:var(--mint)}
.wx-stat .l{font-size:12px;color:rgba(246,240,230,.65);margin-top:7px;line-height:1.4;font-weight:600}
.wx-next{margin-top:30px;background:rgba(91,224,160,.1);border:1px solid rgba(91,224,160,.3);border-radius:18px;padding:20px;opacity:0;transform:translateY(10px);transition:opacity .5s .2s,transform .5s .2s}
.wx-next.in{opacity:1;transform:none}
.wx-next b{font-family:var(--fd);font-size:17px;display:block;margin-bottom:4px}
.wx-next span{font-size:13.5px;color:rgba(246,240,230,.75);line-height:1.55}
.wx-acts{display:flex;gap:10px;flex-wrap:wrap;margin-top:26px}
.wx-foot{margin-top:26px;font-size:12px;color:rgba(246,240,230,.45);line-height:1.55}

/* ============ CHROME ============ */
#topnav{position:sticky;top:0;z-index:70;background:rgba(253,251,247,.9);backdrop-filter:saturate(180%) blur(14px);border-bottom:1px solid var(--line)}
.tn-in{max-width:1280px;margin:0 auto;display:flex;align-items:center;gap:18px;padding:13px 24px}
.tn-logo{display:flex;align-items:center;gap:10px;font-family:var(--fd);font-size:18px;font-weight:600;white-space:nowrap}
.tn-logo .lm{width:34px;height:34px;border-radius:10px;background:var(--ink);display:grid;place-items:center;font-size:17px}
.tn-links{display:flex;gap:2px;flex:1;overflow-x:auto;scrollbar-width:none}
.tn-links::-webkit-scrollbar{display:none}
.tn-links a{padding:9px 13px;border-radius:999px;font-size:13.5px;font-weight:600;color:var(--slate);text-decoration:none;cursor:pointer;white-space:nowrap;display:flex;align-items:center;gap:6px}
.tn-links a.on{background:var(--cream);color:var(--ink)}
.tn-links a .ct{min-width:17px;height:17px;border-radius:99px;background:var(--gold);color:#fff;font-size:10px;font-weight:800;display:inline-flex;align-items:center;justify-content:center;padding:0 5px}
.tn-right{display:flex;align-items:center;gap:9px}
.tierpill{display:inline-flex;align-items:center;gap:6px;border-radius:999px;padding:6px 13px;font-size:11.5px;font-weight:800;white-space:nowrap}
.tabbar{position:fixed;bottom:0;left:0;right:0;background:rgba(253,251,247,.93);backdrop-filter:saturate(180%) blur(16px);border-top:1px solid var(--line);display:none;padding:8px 6px calc(8px + env(safe-area-inset-bottom));z-index:70}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 0;color:var(--slate);font-size:10px;font-weight:600;position:relative}
.tab .ti{font-size:19px;line-height:1}
.tab.on{color:var(--ink)}
.tab .bub{position:absolute;top:2px;right:50%;margin-right:-20px;min-width:15px;height:15px;border-radius:99px;background:var(--gold);color:#fff;font-size:9px;font-weight:800;display:flex;align-items:center;justify-content:center;padding:0 4px}
@media(max-width:919px){
  .tn-links,.tn-right .demo-wrap{display:none}
  .tabbar{display:flex}
  body.inapp{padding-bottom:84px}
}

/* ============ LAYOUT ============ */
.page{max-width:1280px;margin:0 auto;padding:24px 24px 70px}
@media(max-width:899px){.page{padding:18px 16px 46px}}
.phead{margin-bottom:18px}
.phead .eyebrow{margin-bottom:6px}
.phead h1{font-size:clamp(24px,3vw,32px);margin-bottom:4px}
.phead .guide{color:var(--slate);font-size:14.5px}
.cols2{display:grid;grid-template-columns:1.5fr 1fr;gap:18px;align-items:start}
.cols3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
@media(max-width:899px){.cols2,.cols3{grid-template-columns:1fr}}
.stack>*{margin-bottom:16px}
.slabel{display:flex;align-items:baseline;justify-content:space-between;padding:10px 2px 12px;gap:10px;flex-wrap:wrap}
.slabel h3{font-size:19px}
.slabel a{font-size:13px;font-weight:600;color:var(--mint-deep);text-decoration:none;cursor:pointer}

/* hero greeting */
.hero{position:relative;border-radius:var(--rad);overflow:hidden;background:linear-gradient(150deg,#0C3138,#103E44 55%,#0A2C32);color:var(--paper);padding:26px;box-shadow:var(--shadow-lg);margin-bottom:18px}
.hero .eyebrow{color:var(--mint);margin-bottom:8px}
.hero h2{font-size:clamp(21px,2.6vw,27px);color:var(--paper);margin-bottom:6px}
.hero h2 em{font-style:italic;color:var(--mint)}
.hero p{font-size:14px;color:rgba(246,240,230,.78);max-width:560px}
.hero .gloss{position:absolute;right:-30px;top:-30px;width:200px;height:200px;border-radius:50%;background:radial-gradient(circle,rgba(91,224,160,.18),transparent 70%)}
.standing-line{display:inline-flex;align-items:center;gap:12px;flex-wrap:wrap;margin-top:14px;background:rgba(246,240,230,.07);border:1px solid rgba(246,240,230,.14);border-radius:999px;padding:8px 16px;font-size:12.5px;color:rgba(246,240,230,.85);cursor:pointer}
.standing-line .sl-tier{font-family:var(--fd);font-weight:600;color:#E8D9BC;letter-spacing:.02em}
.standing-line .sl-up{color:var(--mint);font-weight:700}

/* TODAY cards */
.today-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:11px;margin-bottom:18px}
@media(min-width:680px){.today-grid{grid-template-columns:repeat(3,1fr)}}
@media(min-width:1020px){.today-grid{grid-template-columns:repeat(5,1fr)}}
.tcard{background:var(--paper);border:1px solid var(--line);border-radius:18px;padding:16px;box-shadow:var(--shadow);text-align:left;transition:transform .12s,border-color .15s;cursor:pointer;display:block;width:100%}
.tcard:hover{border-color:var(--mint);transform:translateY(-2px)}
.tcard .tn{font-family:var(--fd);font-size:30px;font-weight:600;line-height:1}
.tcard .tl{font-size:12px;font-weight:600;color:var(--slate);margin-top:7px;line-height:1.3}
.tcard .td{font-size:11px;font-weight:700;margin-top:5px;color:var(--mint-deep)}
.tcard.hot{border-color:rgba(184,146,79,.55);background:linear-gradient(180deg,var(--paper),#FBF6EC)}
.tcard.hot .tn{color:var(--gold-deep)}

/* opportunity money strip */
.opp-total{border-radius:var(--rad);background:linear-gradient(140deg,#15535C,#0E3A41);color:var(--paper);padding:24px;box-shadow:var(--shadow-lg);position:relative;overflow:hidden}
.opp-total .gloss{position:absolute;right:-40px;top:-40px;width:190px;height:190px;border-radius:50%;background:radial-gradient(circle,rgba(184,146,79,.25),transparent 70%)}
.opp-total .eyebrow{color:var(--mint);margin-bottom:8px}
.opp-total .big{font-family:var(--fd);font-size:clamp(36px,5vw,46px);line-height:1;font-weight:600}
.opp-total .big small{font-size:15px;color:rgba(246,240,230,.6);font-weight:400;font-family:var(--fb)}
.opp-rows{margin-top:16px;border-top:1px solid rgba(246,240,230,.14)}
.opp-row{display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:1px solid rgba(246,240,230,.1);font-size:13.5px}
.opp-row:last-child{border-bottom:none}
.opp-row .ok{width:32px;height:32px;border-radius:10px;background:rgba(246,240,230,.1);display:grid;place-items:center;font-size:15px;flex-shrink:0}
.opp-row .ob{flex:1;min-width:0}
.opp-row .ob b{display:block;font-size:13.5px}
.opp-row .ob span{font-size:11.5px;color:rgba(246,240,230,.6)}
.opp-row .ov{font-family:var(--fd);font-weight:600;font-size:16px;color:#E8D9BC;white-space:nowrap}
.opp-note{font-size:11px;color:rgba(246,240,230,.5);margin-top:12px;line-height:1.5}

/* pipeline board */
.board{display:flex;gap:12px;overflow-x:auto;padding:4px 2px 18px;-webkit-overflow-scrolling:touch}
.bcol{flex:0 0 258px;background:var(--sand);border-radius:var(--rad-sm);padding:10px}
.bcol-head{display:flex;align-items:center;justify-content:space-between;padding:4px 6px 10px}
.bcol-head b{font-size:13px;font-weight:700}
.bcol-head .ct{font-size:11.5px;font-weight:700;background:var(--paper);border-radius:99px;padding:2px 8px;color:var(--slate)}
.pcard{background:var(--paper);border:1px solid var(--line);border-radius:14px;padding:13px;margin-bottom:9px;box-shadow:var(--shadow)}
.pcard .name{font-weight:600;font-size:14px;display:flex;justify-content:space-between;align-items:center;gap:6px}
.pcard .meta{font-size:12px;color:var(--slate);margin-top:4px;line-height:1.45}
.pcard .val{font-family:var(--fd);font-size:16px;font-weight:600;color:var(--gold-deep);margin-top:8px}
.pcard .val small{font-size:10px;font-family:var(--fb);font-weight:700;color:var(--slate);letter-spacing:.04em;text-transform:uppercase}
.pcard .foot{display:flex;justify-content:space-between;align-items:center;margin-top:8px}
.pcard .ago{font-size:11px;color:var(--slate)}
.sig{font-size:10px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;border-radius:6px;padding:3px 7px}
.sig-high{background:var(--gold-soft);color:var(--gold-deep)}
.sig-med{background:var(--mint-soft);color:var(--mint-deep)}
.sig-new{background:var(--paper);border:1px solid var(--mint);color:var(--mint-deep)}

/* performance score */
.scorewrap{display:flex;align-items:center;gap:18px;flex-wrap:wrap}
.ringnum{font-family:var(--fd);font-weight:600}
.score-line{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-top:6px}
.lane{display:grid;grid-template-columns:140px 1fr 56px;gap:12px;align-items:center;padding:9px 0;border-bottom:1px solid var(--line-soft);font-size:13px}
.lane:last-child{border-bottom:none}
.lane b{font-weight:600;font-size:12.5px}
.lane .cap{font-size:10.5px;color:var(--slate);display:block;font-weight:500}
.lane-bar{height:7px;border-radius:99px;background:var(--cream);overflow:hidden}
.lane-bar i{display:block;height:100%;border-radius:99px;background:var(--mint)}
.lane-bar i.gold{background:var(--gold)}
.lane .pts{text-align:right;font-weight:600;font-family:var(--fd);font-size:14px}
@media(max-width:560px){.lane{grid-template-columns:104px 1fr 46px}}

/* activity feed */
.feed-item{display:flex;gap:12px;padding:10px 0;border-bottom:1px solid var(--line-soft);align-items:flex-start}
.feed-item:last-child{border-bottom:none}
.feed-time{font-size:11px;color:var(--slate);min-width:60px;padding-top:3px;font-weight:600}
.feed-dot{width:9px;height:9px;border-radius:50%;background:var(--mint);margin-top:7px;flex:0 0 9px}
.feed-dot.gold{background:var(--gold)}
.feed-dot.plum{background:var(--plum)}
.feed-text{font-size:13.5px;line-height:1.45}
.feed-text b{font-weight:600}
.feed-item.fresh{animation:feedin .5s ease}
@keyframes feedin{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:none}}
.live-dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--mint);margin-right:6px;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}

/* reputation */
.rep-strip{display:flex;align-items:center;gap:20px;flex-wrap:wrap}
.rep-big{font-family:var(--fd);font-size:52px;font-weight:600;line-height:1}
.stars{color:var(--gold);font-size:16px;letter-spacing:2px}
.rep-src{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-top:4px}
@media(min-width:760px){.rep-src{grid-template-columns:repeat(4,1fr)}}
.src-card{padding:14px;text-align:center;background:var(--paper);border:1px solid var(--line);border-radius:var(--rad-sm);box-shadow:var(--shadow)}
.src-card .s-name{font-size:11.5px;font-weight:700;color:var(--slate)}
.src-card .s-rate{font-family:var(--fd);font-size:23px;font-weight:600;margin-top:3px}
.src-card .s-ct{font-size:11px;color:var(--slate)}
.src-card .s-d{font-size:11px;font-weight:700;color:var(--mint-deep);margin-top:2px}
.spark{display:flex;align-items:flex-end;gap:5px;height:54px;margin-top:8px}
.spark i{flex:1;border-radius:5px 5px 2px 2px;background:var(--mint-soft);min-width:8px;position:relative}
.spark i.on{background:var(--mint)}
.spark-lbl{display:flex;gap:5px;font-size:9.5px;color:var(--slate);font-weight:700;margin-top:5px}
.spark-lbl span{flex:1;text-align:center}
.confbox{background:var(--cream);border-radius:12px;padding:11px 13px}
.confbox span{font-size:10px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--slate);display:block}
.confbox b{font-size:14px;font-family:var(--fd)}

/* rankings */
.plaque{background:linear-gradient(160deg,#082A30,#0E3A41);border-radius:var(--rad);padding:28px 26px;color:var(--paper);position:relative;overflow:hidden;border:1px solid rgba(184,146,79,.4);box-shadow:var(--shadow-lg)}
.plaque::before{content:"";position:absolute;inset:10px;border:1px solid rgba(184,146,79,.45);border-radius:14px;pointer-events:none}
.plaque.reveal::before{animation:engrave 1.1s ease forwards}
@keyframes engrave{from{clip-path:inset(0 100% 0 0);opacity:0}to{clip-path:inset(0 0 0 0);opacity:1}}
.plaque .pq-eyebrow{font-size:10.5px;font-weight:800;letter-spacing:.14em;text-transform:uppercase;color:#E8D9BC}
.plaque h2{font-family:var(--fd);font-size:clamp(26px,5vw,34px);font-weight:600;margin-top:8px;color:var(--paper)}
.plaque .pq-sub{font-size:13px;color:rgba(246,240,230,.7);margin-top:6px}
.pq-num{font-family:var(--fd);font-size:15px;color:#E8D9BC;margin-top:14px;font-weight:600}
.pq-progress{height:5px;border-radius:99px;background:rgba(246,240,230,.13);margin-top:10px;max-width:400px;overflow:hidden}
.pq-progress i{display:block;height:100%;background:var(--gold);border-radius:99px}
.pq-note{font-size:11.5px;color:rgba(246,240,230,.55);margin-top:10px}
.rank-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:11px}
@media(min-width:760px){.rank-grid{grid-template-columns:repeat(4,1fr)}}
.rank-card{background:var(--paper);border:1px solid var(--line);border-radius:18px;padding:16px;box-shadow:var(--shadow);text-align:center}
.rank-card .rk{font-family:var(--fd);font-size:28px;font-weight:600;line-height:1}
.rank-card .rl{font-size:11.5px;font-weight:700;color:var(--slate);margin-top:6px}

function countUp(el,target,ms){
  var t0=null,from=0;
  function step(ts){
    if(!t0)t0=ts;
    var p=Math.min(1,(ts-t0)/ms);p=1-Math.pow(1-p,3);
    el.textContent=Math.round(from+(target-from)*p).toLocaleString('en-US');
    if(p<1)requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}

function mapTier(t){return t==='platinum_elite'?'platinum':(t==='capy_accredited'?'accredited':'free');}
function fmtDate(ts){if(!ts)return '';var d=new Date(ts),now=new Date();if(d.toDateString()===now.toDateString())return 'Today';return d.toLocaleDateString('en-US',{month:'short',day:'numeric'});}
function fmtTime(ts){if(!ts)return '';return new Date(ts).toLocaleString('en-US',{month:'short',day:'numeric',hour:'numeric',minute:'2-digit'});}
function vOpen(st){return ['verified','closed','declined','expired','answered','canceled','cancelled'].indexOf(String(st||'').toLowerCase())<0;}
var EST={verify:400,verifyMajor:1250,booking:350,lead:2500,nomination:4500};
function estVerify(reason){
  var r=String(reason||'').toLowerCase();
  if(/crown|implant|root canal|bridge|denture|surgery/.test(r))return EST.verifyMajor;
  return EST.verify;
}
function liveScoreItems(row){
  var g=(row.gallery_images||[]).length,pr=(row.procedures||[]).length;
  return [
    {n:'Practice description',w:8,f:row.short_description?1:0,t:'Write a short practice description'},
    {n:'Doctor name',w:6,f:row.doctor_name?1:0,t:'Add the doctor name'},
    {n:'Office photos',w:14,f:g>=4?1:(g>0?0.5:0),t:'Add office photos ('+g+' of 4)'},
    {n:'Cover image',w:4,f:row.cover_image_url?1:0,t:'Add a cover image'},
    {n:'Languages',w:6,f:(row.languages||[]).length?1:0,t:'List the languages you speak'},
    {n:'Weekend hours declared',w:4,f:(row.open_weekends===true||row.open_weekends===false)?1:0,t:'Declare weekend availability'},
    {n:'Insurance networks',w:12,f:(row.insurance_networks||[]).length?1:0,t:'Confirm the PPO networks you accept'},
    {n:'Procedures listed',w:10,f:pr>=5?1:(pr>0?0.5:0),t:'List your procedures ('+pr+' added)'},
    {n:'Online booking link',w:8,f:row.booking_url?1:0,t:'Add your online booking link'},
    {n:'Website',w:8,f:row.website?1:0,t:'Add your website'},
    {n:'Google reviews connected',w:10,f:(row.google_review_count||0)>0?1:0,t:'Connect your Google reviews'},
    {n:'Profile claimed',w:10,f:row.is_claimed?1:0,t:'Finish claiming your profile'}
  ];
}
function liveScore(row){
  var items=liveScoreItems(row),s=0;
  items.forEach(function(i){s+=i.w*i.f;});
  s=Math.round(s);
  var band=s>=95?'Complete':s>=80?'Strong':s>=60?'Solid':'Getting started';
  var tasks=items.filter(function(i){return i.f<1;}).map(function(i){return {t:i.t,gain:Math.round(i.w*(1-i.f))};}).sort(function(a,b){return b.gain-a.gain;});
  return {total:s,band:band,tasks:tasks};
}
function feedLine(a){
  var who=esc(a.patient||'A patient');
  if(a.kind==='nomination')return '<b>'+who+'</b> nominated your office'+(a.detail?': "'+esc(a.detail)+'"':'.');
  if(a.kind==='review')return '<b>'+who+'</b> left a '+(a.rating||5)+' star CoverCapy review'+(a.detail?': "'+esc(a.detail)+'"':'.');
  if(a.kind==='booking')return '<b>'+who+'</b> booked your office'+(a.starts_at?' for '+fmtTime(a.starts_at):'')+(a.ppo_verified?' &#183; PPO verified':'')+'.';
  if(a.kind==='verification')return '<b>'+who+'</b> asked you to verify '+(esc(a.detail||'their insurance'))+'.';
  return '<b>'+who+'</b> interacted with your profile.';
}
function buildLiveData(row,sum,act,inb,noms,cityList,county){
  sum=sum||{};act=act||[];inb=inb||[];noms=noms||[];cityList=cityList||[];
  S.row=row;
  var sc=liveScore(row);
  var openVer=inb.filter(function(r){return r.source==='verification'&&vOpen(r.status);});
  var upBook=inb.filter(function(r){return r.source==='booking'&&r.starts_at&&new Date(r.starts_at)>=new Date();});
  var recentRev=act.filter(function(a){return a.kind==='review';});

function gateMsg(html){var g=$('gMsg');if(g)g.innerHTML=html;}
function loadOffice(){
  sb.auth.getUser().then(function(u){
    var uid=u.data&&u.data.user&&u.data.user.id;
    if(!uid)return;
    sb.from('dentists').select('*').eq('claimed_by',uid).limit(1).then(function(r){
      if(r.error){gateMsg(esc(r.error.message));return;}
      if(!r.data||!r.data.length){ showOnboard(u.data.user); return; }
      var row=r.data[0];
      Promise.all([
        sb.rpc('office_feedback_summary',{p_dentist:row.id}),
        sb.rpc('office_recent_activity',{p_dentist:row.id,p_limit:30}),
        sb.rpc('office_inbox',{p_dentist:row.id}),
        sb.from('dentist_nominations').select('*').eq('dentist_id',row.id).order('created_at',{ascending:false}),
        sb.from('dentists').select('id,practice_name,name,city,membership_tier,weighted_rating,weighted_review_count').eq('city',row.city||'').order('weighted_rating',{ascending:false}).limit(200),
        sb.from('dentist_promotions').select('*').eq('dentist_id',row.id).order('created_at',{ascending:false})
      ]).then(function(res){
        buildLiveData(row,res[0].data||{},res[1].data||[],res[2].data||[],res[3].data||[],res[4].data||[],null);
        DATA.promotionsLive=res[5].data||[];
        S.live=true;S.first=false;S.dTier=mapTier(row.membership_tier);S.entered=true;
        $('gate').classList.add('hidden');
        var wkey='ccv30_welcomed_'+row.id;
        var fresh=DATA.score.total<60;
        if(fresh&&!localStorage.getItem(wkey)){try{localStorage.setItem(wkey,'1');}catch(e){}openWelcome();}
        else enter(false);
      });
    });
  });
}
function boot(){
  if(DEMO||!sb)return;
  sb.auth.getSession().then(function(s){
    if(s.data&&s.data.session)loadOffice();
    else location.replace('/?role=dentist');
  });
  sb.auth.onAuthStateChange(function(ev,session){if(session&&!S.live)loadOffice();});
}

/* ===== ONBOARDING: find or add your office (ported from live portal) ===== */
function showOnboard(user){
  $('gate').classList.add('hidden');
  $('onboard').classList.remove('hidden');
  S.authEmail=user&&user.email||'';
  $('obFind').onclick=function(){$('obFind').classList.add('on');$('obAdd').classList.remove('on');renderFind();};
  $('obAdd').onclick=function(){$('obAdd').classList.add('on');$('obFind').classList.remove('on');renderAdd();};
  $('obSignout').onclick=function(){sb.auth.signOut().then(function(){location.reload();});};
  renderFind();
}
function renderFind(){
  $('obBody').innerHTML='<div class="field"><label>Search the CoverCapy directory</label><input id="obQ" placeholder="Practice name or city" autocomplete="off"></div><div class="reslist" id="obRes"><div class="empty">Start typing to find your office.</div></div>';
  var q=$('obQ'),tmr;
  q.addEventListener('input',function(){clearTimeout(tmr);tmr=setTimeout(doSearch,250);});
  q.focus();
}
function doSearch(){
  var term=($('obQ').value||'').trim();
  if(term.length<2){$('obRes').innerHTML='<div class="empty">Keep typing&#8230;</div>';return;}
  var like='*'+term.replace(/[(),*]/g,'')+'*';
  sb.from('dentists').select('id,name,practice_name,doctor_name,city,state,claimed_by').or('practice_name.ilike.'+like+',name.ilike.'+like+',city.ilike.'+like).limit(10).then(function(r){
    if(r.error){$('obRes').innerHTML='<div class="empty">'+esc(r.error.message)+'</div>';return;}
    if(!r.data.length){$('obRes').innerHTML='<div class="empty">No matches. Try the "Add my office" tab.</div>';return;}
    $('obRes').innerHTML=r.data.map(function(d){
      var nm=esc(d.practice_name||d.name||'Office');
      var claimed=d.claimed_by!=null;
      return '<button class="resitem" '+(claimed?'disabled style="opacity:.5"':'data-claim="'+d.id+'" data-nm="'+nm+'"')+'><div style="flex:1"><b>'+nm+'</b><span>'+esc([d.doctor_name,d.city,d.state].filter(Boolean).join(' · '))+'</span></div>'+(claimed?'<span class="mini pend">Already claimed</span>':'<span class="mini lang">Claim</span>')+'</button>';
    }).join('');
    document.querySelectorAll('[data-claim]').forEach(function(b){b.addEventListener('click',function(){claimSheet(this.getAttribute('data-claim'),this.getAttribute('data-nm'));});});
  });
}

/* ===== sheets / celebrate ===== */
function openSheet(html){$('sheetIn').innerHTML='<div class="grab"></div>'+html;$('sheet').classList.add('open');wire($('sheetIn'));}
function closeSheet(){$('sheet').classList.remove('open');}
$('sheet').addEventListener('click',function(e){if(e.target===this)closeSheet();});
function celebrate(o){
  openSheet('<div class="celebrate"><div class="em">'+o.em+'</div><h3>'+o.title+'</h3>'
   +(o.chip?'<div class="chip2">'+o.chip+'</div>':'')
   +'<p>'+o.body+'</p><button class="btn btn-ink btn-full" data-close="1">Continue</button></div>');
}

/* ===== dentist moments (toasts) ===== */
function showMoment(m){
  var t=document.createElement('div');
  t.className='toast';
  t.innerHTML='<div class="tic">'+m.ic+'</div><div class="tx"><b>'+m.h+'</b><span>'+m.s+'</span></div>';
  t.addEventListener('click',function(){t.classList.add('out');setTimeout(function(){t.remove();},350);});
  $('toasts').appendChild(t);
  setTimeout(function(){t.classList.add('out');setTimeout(function(){t.remove();},350);},5200);
}
function startMoments(){
  if(S.momentTimer)return;
  var list=momentsFor();
  if(!list.length)return;
  setTimeout(function(){showMoment(list[0]);S.momentIdx=1;},2500);
  S.momentTimer=setInterval(function(){
    if(S.momentIdx>=list.length){clearInterval(S.momentTimer);return;}
    showMoment(list[S.momentIdx]);S.momentIdx++;
  },16000);
}

/* ===== router ===== */
var VIEWS={today:vToday,pipeline:vPipeline,patients:vPatients,reputation:vReputation,rankings:vRankings,rewards:vRewards,dprofile:vDProfile,membership:vMembership};
function route(){
  if(!S.entered){renderGate();return;}
  var id=(location.hash||'').replace('#/','')||'today';
  if(!VIEWS[id])id='today';
  $('view').innerHTML=VIEWS[id]();
  renderChromeCounts();
  setActive(id);
  wire($('view'));
  var pill=$('dTierPill');if(pill){pill.innerHTML=tierLabel();pill.style.cssText+=';'+tierPillStyle();}
  if(id==='rankings'){var pq=$('plaque');if(pq){pq.classList.remove('reveal');void pq.offsetWidth;pq.classList.add('reveal');}}
  window.scrollTo(0,0);
}
function renderChromeCounts(){
  document.querySelectorAll('#topnav .tn-links a').forEach(function(a){
    var c=navCount(a.dataset.go);
    var ex=a.querySelector('.ct');if(ex)ex.remove();
    if(c){var s=document.createElement('span');s.className='ct';s.textContent=c;a.appendChild(s);}
  });
}
function go(id){location.hash='#/'+id;}
window.addEventListener('hashchange',route);

/* ===== event wiring (delegated) ===== */
function wire(root){
  root.querySelectorAll('[data-go]').forEach(function(el){
    el.addEventListener('click',function(e){e.stopPropagation();go(el.dataset.go);});
  });
  root.querySelectorAll('[data-ob]').forEach(function(el){
    el.addEventListener('click',function(){obComplete(el.dataset.ob);});
  });
  root.querySelectorAll('[data-close]').forEach(function(el){
    el.addEventListener('click',closeSheet);
  });
  root.querySelectorAll('[data-elig]').forEach(function(el){
    el.addEventListener('click',function(){
      openSheet('<h3 class="serif">Donna Tran &#183; Humana PPO</h3><div class="ssub">Member 0000027201988 &#183; verified by the CoverCapy team</div>'
       +'<div style="font-size:13.5px;line-height:2"><b>Key financials</b><br>Annual maximum: $5,000 &#183; $3,665 left<br>Deductible: $75 &#183; met<br><br><b>Coverage in network</b><br>Preventive 100% &#183; Basic 80% &#183; Major 50%<br><br><b>Limits</b><br>Cleanings 2 per year &#183; Exams 2 per year</div>'
       +'<button class="btn btn-ink btn-full" style="margin-top:18px" data-close="1">Done</button>');
    });
  });
  root.querySelectorAll('[data-opp]').forEach(function(el){
    el.addEventListener('click',function(){
      if(S.live){
        var o=null;DATA.opportunities.forEach(function(x){if(x.name===el.dataset.opp)o=o||x;});
        if(!o)return;
        openSheet('<h3 class="serif">'+o.name+'</h3><div class="ssub">'+o.kind+' &#183; '+o.meta+'</div>'
         +'<div style="font-size:13.5px;line-height:1.7"><b>'+fmt$(o.value)+'</b> '+o.vlabel.toLowerCase()+' &#183; estimate from national PPO fee averages, never shown to patients.</div>'
         +(o._src==='verification'?'<button class="btn btn-mint btn-full" style="margin-top:16px" data-vreply="'+o._id+'">We accept this insurance &#10003;</button>':'')
         +(o._src==='nomination'?'<button class="btn btn-gold btn-full" style="margin-top:16px" data-creditlive="'+o._id+'">Credit this nomination</button>':'')
         +'<button class="btn btn-ghost btn-full btn-sm" style="margin-top:8px" data-close="1">Close</button>');
        return;
      }
      celebrate({em:'&#128203;',title:el.dataset.opp,body:'In the live build this opens the patient thread with their verified benefit snapshot, one tap replies, and booking actions.'});
    });
  });
  root.querySelectorAll('[data-slot]').forEach(function(el){
    el.addEventListener('click',function(){
      var k=el.dataset.slot,m=null;MEDIA.forEach(function(x){if(x.k===k)m=x;});
      if(!m||m.done)return;
      if(m.plat&&!plat()){celebrate({em:'&#9670;',title:'A Platinum Elite slot',body:m.n+' is part of the Showcase Builder, the profile experience Platinum offices shape themselves.'});return;}
      m.done=true;route();
      celebrate({em:'&#128247;',title:m.n+' added',chip:'+ profile strength &#183; live after review',body:'It goes live on your public card after a quick review by our team.'});
    });
  });
  root.querySelectorAll('[data-act]').forEach(function(el){
    el.addEventListener('click',function(e){
      e.stopPropagation();
      var a=el.dataset.act;
      if(a==='setup'){go('dprofile');}
      else if(a==='approve'){el.textContent='Approved ✓';el.disabled=true;el.style.opacity='.65';showMoment({ic:'&#128081;',h:'Reward approved',s:'Priya R. is booked for whitening. Verified visit logged.'});}
      else if(a==='reply'||a==='confirmrev'||a==='reply1'){el.textContent='Done ✓';el.disabled=true;el.style.opacity='.65';}
      else if(a==='copylink'){el.textContent='Copied ✓';setTimeout(function(){el.textContent='Copy link';},1600);}
      else if(a==='thank'){el.textContent='Sent ✓';el.disabled=true;el.style.opacity='.65';}
      else if(a==='nomwall'){celebrate({em:'&#127942;',title:'Nomination featured',body:'Mina’s words now show on your public profile, labeled as a patient nomination and kept separate from reviews.'});}
      else if(a==='apply'){
        openSheet('<h3 class="serif">Apply for Capy Accreditation</h3><div class="ssub">Reviewed on merit, usually within a week. You are not charged to apply: the $369 per month membership begins only if approved.</div>'
         +'<div class="field"><label>Work email</label><input id="applyEmail" placeholder="frontdesk@capybaracove.com"></div>'
         +'<div class="field"><label>Best phone for the review call</label><input id="applyPhone" placeholder="(714) 555-0142"></div>'
         +'<button class="btn btn-gold btn-full" data-act="applysend">Submit application</button>'
         +'<div class="muted" style="font-size:11.5px;margin-top:10px;text-align:center">Accreditation is reviewed on merit and is never sold.</div>');
      }
      else if(a==='applysend'){closeSheet();celebrate({em:'&#127942;',title:'Application submitted',chip:'Review usually within a week',body:'Our team reviews your profile, your patient feedback, and your commitments. We will email you at each step.'});}
      else if(a==='tier3'){
        openSheet('<h3 class="serif">Talk to us about Platinum Elite</h3><div class="ssub">$6,990 per year, about $583 per month. A growth specialist walks through featured placement, competitive analytics, and the Showcase Builder with your numbers.</div>'
         +'<div class="field"><label>Work email</label><input placeholder="frontdesk@capybaracove.com"></div>'
         +'<div class="field"><label>Best time to call</label><input placeholder="Weekday mornings"></div>'
         +'<button class="btn btn-plum btn-full" data-act="tier3send">Request the call</button>');
      }
      else if(a==='tier3send'){closeSheet();celebrate({em:'&#9670;',title:'Request received',chip:'Reply within one business day',body:'Your growth specialist will bring your market numbers: missed searches, the 163 point gap, and what featured placement covers from your address.'});}
      else if(a==='newcamp'){celebrate({em:'&#128227;',title:'New campaign',body:'Pick a reward, set the Crown cost (1,500 floor), and our team reviews it before it goes live to patients.'});}
      else if(a==='showcase'){celebrate({em:'&#127912;',title:'Showcase Builder',body:'Cover image, featured procedures, featured quote, video, gallery, and section ordering, with a live preview of your page at every tier.'});}
      else if(a==='publiccard'){celebrate({em:'&#129441;',title:'Your public card',body:'4.8 ★ · '+(paid()?'132 reviews across 4 sources':'96 Google reviews')+' · "Gentle with kids, honest pricing" · English, Mandarin · weekend hours. This is what patients see in search.'});}
      else if(a==='taskbio'||a==='tasksite'||a==='taskphotos'){celebrate({em:'&#9650;',title:'Nice pick',chip:'Highest value next step',body:'In the live build this opens the editor. Each completed task raises your profile strength and your search position within your tier.'});}
      else if(a==='brand'){celebrate({em:'&#128221;',title:'Brand block',body:'In the live build this opens the editor for this block, with examples from top performing offices.'});}
      else if(a==='promolive'){
        var ti=($('promoT').value||'').trim();
        if(!ti){showMoment({ic:'&#9999;',h:'Add a title first',s:'Give the promotion a short name patients will read.'});return;}
        el.disabled=true;
        sb.auth.getUser().then(function(u){
          return sb.from('dentist_promotions').insert({dentist_id:S.row.id,title:ti,body:$('promoD').value,status:'active',created_by:u.data.user.id});
        }).then(function(r){
          el.disabled=false;
          if(r.error){showMoment({ic:'&#9888;',h:'Could not launch',s:r.error.message});return;}
          return sb.from('dentist_promotions').select('*').eq('dentist_id',S.row.id).order('created_at',{ascending:false}).then(function(q){DATA.promotionsLive=q.data||[];route();showMoment({ic:'&#128227;',h:'Promotion is live',s:'Patients now see it on your public card.'});});
        });
      }
      else if(a==='savepflive'){
        el.disabled=true;
        var patch={practice_name:$('pf_practice').value,doctor_name:$('pf_doctor').value,short_description:$('pf_desc').value,booking_url:$('pf_book').value,website:$('pf_site').value};
        sb.from('dentists').update(patch).eq('id',S.row.id).then(function(r){
          el.disabled=false;
          if(r.error){showMoment({ic:'&#9888;',h:'Save failed',s:r.error.message});return;}
          Object.assign(S.row,patch);
          var sc2=liveScore(S.row);DATA.score.total=sc2.total;DATA.score.pct='Profile strength &#183; '+sc2.band;DATA.scoreTasks=sc2.tasks;
          route();showMoment({ic:'&#9650;',h:'Profile saved',s:'Live on your public card. Strength: '+sc2.total+'.'});
        });
      }
      else if(a==='publiccardlive'){
        if(S.row&&S.row.profile_url)window.open(S.row.profile_url,'_blank');
        else celebrate({em:'&#129441;',title:'Your public card',body:esc(DATA.office.name)+' &#183; '+DATA.reputation.rating+' ★ · '+DATA.reputation.count+' reviews. Patients see this card in Find a Dentist.'});
      }
    });
  });
  root.querySelectorAll('[data-vreply]').forEach(function(el){
    el.addEventListener('click',function(){
      var id=el.dataset.vreply;el.disabled=true;
      sb.auth.getUser().then(function(u){
        return sb.from('verification_responses').insert({request_id:id,dentist_id:S.row.id,responder:u.data.user.id,answer:'accepted',note:'We accept this insurance.'});
      }).then(function(r){
        if(r.error){el.disabled=false;showMoment({ic:'&#9888;',h:'Reply failed',s:r.error.message});return;}
        el.textContent='Sent ✓';showMoment({ic:'&#128203;',h:'Reply sent',s:'The patient sees your answer in their app.'});
      });
    });
  });
  root.querySelectorAll('[data-creditlive]').forEach(function(el){
    el.addEventListener('click',function(){
      var id=el.dataset.creditlive;el.disabled=true;
      sb.rpc('credit_nomination',{in_nomination:id}).then(function(r){
        if(r.error){el.disabled=false;showMoment({ic:'&#9888;',h:'Could not credit',s:r.error.message});return;}
        el.textContent='Credited ✓';showMoment({ic:'&#127942;',h:'Nomination credited',s:'The patient receives their network reward.'});

/* ===== entry ===== */
function enter(toSetup){
  S.entered=true;
  renderChrome();
  if(toSetup){location.hash='#/dprofile';}else{location.hash='#/today';}
  route();
  startMoments();
}
$('gate').addEventListener('click',function(e){
  var b=e.target.closest('[data-enter]');if(!b)return;
  $('gate').classList.add('hidden');
  if(b.dataset.enter==='first'){S.first=true;S.dTier='free';openWelcome();}
  else{S.first=false;S.dTier='accredited';enter(false);}
});
renderGate();
boot();
})();
